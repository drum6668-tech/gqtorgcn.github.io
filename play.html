<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频播放页</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f7f6;
      color: #1f2d2a;
    }
    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .video-box {
      background: #000;
    }
    video {
      display: block;
      width: 100%;
      height: auto;
    }
    .content {
      padding: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.3;
    }
    p {
      margin: 0 0 14px;
      color: #5b6d68;
      line-height: 1.7;
      font-size: 15px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #2fc28d;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      padding: 14px 16px;
      border-radius: 12px;
      margin-top: 10px;
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: #7a8d87;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="video-box">
        <video
          controls
          autoplay
          muted
          playsinline
          poster="https://picsum.photos/id/237/1280/720"
        >
          <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
          你的浏览器不支持视频播放。
        </video>
      </div>

      <div class="content">
        <h1>视频播放页</h1>
        <p>观看视频后，可点击下面按钮前往官网页面。</p>

        <a class="btn" href="https://qqc.bar/" target="_blank" rel="noopener noreferrer">
          前往官网
        </a>

        <div class="sub">如果按钮无效，请直接访问 qqc.bar</div>
      </div>
    </div>
  </div>
</body>
</html>
